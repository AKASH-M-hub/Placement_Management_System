# ===== DATABASE =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:pms_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:}}
# -1 = start pool immediately without waiting for DB; connections established lazily
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=60000

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
# Skip JDBC metadata access during bootstrap so no DB connection needed at startup
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# ===== STARTUP =====
# Defer all bean creation until first request - healthcheck passes without DB
spring.main.lazy-initialization=true

# ===== SERVER =====
server.port=${PORT:8080}

# ===== ACTUATOR / HEALTHCHECK =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.health.db.enabled=false
